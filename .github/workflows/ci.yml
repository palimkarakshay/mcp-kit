name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  typescript:
    name: TypeScript (build · typecheck · test · tool-lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test
      - name: Tool-description lint (CI gate)
        run: pnpm lint:tools

  python:
    name: Python twin (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python-twin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Pytest (offline)
        run: python -m pytest -q
